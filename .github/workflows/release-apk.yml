name: release-apk

on:
  pull_request_target:
    types: [closed]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-apk-main
  cancel-in-progress: false

jobs:
  release-apk:
    name: build signed APK and publish GitHub release
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      GH_TOKEN: ${{ github.token }}
      JCS2_BASE_APK_URL: ${{ vars.JCS2_BASE_APK_URL || secrets.JCS2_BASE_APK_URL }}
      JCS2_KEYSTORE_BASE64: ${{ secrets.JCS2_KEYSTORE_BASE64 }}
      JCS2_KEYSTORE_PASS: ${{ secrets.JCS2_KEYSTORE_PASS }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Android SDK build tools
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: pwsh
        run: sdkmanager "platforms;android-28" "build-tools;36.1.0"

      - name: Install CI tools
        shell: pwsh
        run: .\scripts\ci_install_tools.ps1

      - name: Install Rust Android target
        shell: pwsh
        run: rustup target add aarch64-linux-android

      - name: Restore ignored game assets
        shell: pwsh
        run: .\scripts\ci_restore_assets.ps1

      - name: Materialize signing keystore
        shell: pwsh
        run: |
          if (-not $env:JCS2_KEYSTORE_BASE64) {
            throw "Missing required secret JCS2_KEYSTORE_BASE64"
          }
          if (-not $env:JCS2_KEYSTORE_PASS) {
            throw "Missing required secret JCS2_KEYSTORE_PASS"
          }
          [System.IO.File]::WriteAllBytes(
            (Join-Path $PWD "jcs2.keystore"),
            [Convert]::FromBase64String($env:JCS2_KEYSTORE_BASE64)
          )

      - name: Prepare iterative release version
        id: version
        shell: pwsh
        run: .\scripts\ci_prepare_release.ps1

      - name: Rust format check
        shell: pwsh
        run: cargo fmt --manifest-path native_bridge\Cargo.toml -- --check

      - name: Build native bridge
        shell: pwsh
        run: .\build_native.ps1

      - name: Build signed APK
        shell: pwsh
        run: .\build_apk.ps1

      - name: Package release asset
        id: asset
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force apks | Out-Null
          $apk = Join-Path "apks" "${{ steps.version.outputs.apk_name }}"
          Copy-Item -LiteralPath "jcs_modded.apk" -Destination $apk -Force
          $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $apk).Hash
          "apk_path=$apk" >> $env:GITHUB_OUTPUT
          "sha256=$hash" >> $env:GITHUB_OUTPUT
          @"
          JCS2 Community Mod ${{ steps.version.outputs.version_name }}

          Commit: $env:GITHUB_SHA
          APK: ${{ steps.version.outputs.apk_name }}
          SHA-256: $hash
          "@ | Set-Content -LiteralPath release-notes.md -Encoding UTF8

      - name: Publish GitHub release
        shell: pwsh
        run: |
          gh release create "${{ steps.version.outputs.tag_name }}" `
            "${{ steps.asset.outputs.apk_path }}" `
            --target "$env:GITHUB_SHA" `
            --title "${{ steps.version.outputs.release_title }}" `
            --notes-file release-notes.md

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.apk_name }}
          path: ${{ steps.asset.outputs.apk_path }}
          if-no-files-found: error
