name: export-native-so

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust Android target
        shell: pwsh
        run: rustup target add aarch64-linux-android

      - name: Build native bridge
        shell: pwsh
        run: .\build_native.ps1

      - name: Upload libjcs2mod.so
        uses: actions/upload-artifact@v4
        with:
          name: libjcs2mod-so
          path: decompiled/lib/arm64-v8a/libjcs2mod.so
          if-no-files-found: error
